<!DOCTYPE html>
<html>
<head>
  <title>Lecture Tracker • Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- ✅ Firebase (MUST come BEFORE script.js) -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <!-- ✅ Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="app">

  <div class="main">

  <!-- HOME -->
  <div id="home" class="screen active">
    <h1>Dashboard</h1>

    <div class="grid">

      <!-- LOGIN -->
      <div id="authSection" class="card">
        <button id="loginBtn" onclick="login()">🔐 Login</button>
        <div id="userInfo" style="display:none;">
          <span id="userName"></span>
          <button onclick="logout()">Logout</button>
        </div>
      </div>

      <!-- DASHBOARD -->
      <div class="card" id="dashboard"></div>

      <!-- CHART -->
      <div class="card">
        <canvas id="chart"></canvas>
      </div>

      <!-- NEXT TASK -->
      <div class="card highlight">
        <h3>Next Task</h3>
        <div id="nextLecture"></div>
      </div>

      <div class="card">
  <h3>📌 Quick Actions</h3>
  <div class="btn-group">
    <button type="button" onclick="showPending()">Pending</button>
    <button type="button" onclick="showWeak()">Weak</button>
  </div>
</div>

<!-- DAILY TARGET -->
<div class="card">
  <h3>🎯 Daily Target</h3>
  <input type="number" id="dailyTargetInput" placeholder="Target">
  <button type="button" onclick="setDailyTarget()">Set</button>
  <div id="dailyStatus"></div>
</div>

<!-- TIMER -->
<div class="card">
  <h3>⏱️ Study Timer</h3>
  <div id="timerDisplay">00:00</div>
  <button type="button" onclick="startTimer()">Start</button>
  <button type="button" onclick="stopTimer()">Stop</button>
  <div id="todayTime"></div>
</div>

<div class="card">
  <h3>📊 Daily Report</h3>
  <div id="dailyReport"></div>
</div>

</div> <!-- grid -->
</div> <!-- home -->


  <!-- SUBJECT -->
  <div id="subjectScreen" class="screen">
    <button type="button" onclick="goHome()">⬅ Back</button>
    <h1 id="subjectTitle"></h1>

    <div class="card">
      <input id="chapterName" placeholder="Enter chapter name...">
      <input id="lectureCount" type="number" placeholder="Lectures">
      <button type="button" onclick="addChapter()">Add Chapter</button>
    </div>
    <div class="card">
  <input id="searchChapter" placeholder="Search chapter..." oninput="filterChapters(this.value)">
</div>

    <div id="chapterList">
  <div class="card">No chapters yet</div>
 </div>
</div> <!-- subjectScreen -->

  <!-- CHAPTER -->
  <div id="chapterScreen" class="screen">
    <button type="button" onclick="show('subjectScreen')">⬅ Back</button>
    <h1 id="chapterTitle"></h1>
    <div class="card">
      <button type="button" onclick="markAllDone()">✅ Mark All Done</button>
      <div id="lectureList"></div>
    </div>
  </div>

</div>

  <!-- BOTTOM NAV -->
  <div class="bottom-nav">
    <button type="button" onclick="goHome()">🏠</button>
    <button type="button" onclick="openSubject('Physics')">⚡</button>
    <button type="button" onclick="openSubject('Chemistry')">🧪</button>
    <button type="button" onclick="openSubject('Maths')">📐</button>
  </div>

</div>

<!-- ✅ YOUR SCRIPT (ALWAYS LAST) -->
<div id="popup" class="popup hidden">
  <div class="popup-content">
    <h3 id="popupTitle"></h3>
    <div id="popupBody"></div>
    <button type="button" onclick="closePopup()">Close</button>
  </div>
</div>
<script src="script.js"></script>

</body>
</html>
